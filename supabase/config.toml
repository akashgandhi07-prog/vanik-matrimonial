# https://supabase.com/docs/guides/cli/config
project_id = "vanik-matrimonial"

[api]
enabled = true

[auth]
# Local CLI only. Hosted project: Dashboard → Authentication → URL Configuration — set Site URL to your
# canonical origin (e.g. https://matrimonial.vanikcouncil.uk) and add Redirect URLs for that host, previews, and local dev.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:5173/**", "https://*.vercel.app", "https://matrimonial.vanikcouncil.uk/**"]

[auth.email]
enable_confirmations = true

# Gateway JWT check (verify_jwt): when true, Supabase may return 401 "Invalid JWT" before your code runs
# (e.g. legacy vs publishable keys, JWT signing changes). These handlers already validate Bearer tokens via
# auth.getUser() (or magic-link tokens) inside the function - same security, reliable behavior.
# Keep verify_jwt = false for webhooks/cron too (no user JWT).
[functions.serve-photo]
verify_jwt = false

[functions.validate-coupon]
verify_jwt = false

[functions.submit-registration]
verify_jwt = false

[functions.admin-approve-member]
verify_jwt = false

[functions.admin-reject-member]
