# https://supabase.com/docs/guides/cli/config
project_id = "vanik-matrimonial"

[api]
enabled = true

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://*.vercel.app"]

[auth.email]
enable_confirmations = true

# Gateway JWT checks often return 401 "Invalid JWT" (stale token, env mismatch, etc.).
# Each function still verifies the user with supabase.auth.getUser() + service role where needed.
[functions.serve-photo]
verify_jwt = false

[functions.validate-coupon]
verify_jwt = false

[functions.submit-registration]
verify_jwt = false

[functions.admin-approve-member]
verify_jwt = false

[functions.admin-reject-member]
verify_jwt = false

[functions.submit-contact-request]
verify_jwt = false

[functions.request-account-deletion]
verify_jwt = false

[functions.send-email]
verify_jwt = false

[functions.expire-memberships]
verify_jwt = false
schedule = "0 7 * * *"

[functions.send-feedback-reminders]
verify_jwt = false
